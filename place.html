<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Quilotoa, Ecuador</title>
    <meta name="description" content="Data and weather page for the Quilotoa Lake in Ecuador for the WDD 131 course.">
    <meta name="author" content="Andre Guerrero">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>
<body>
    <header>
        <h1>Quilotoa, Ecuador</h1>
    </header>

    <main>
        <div class="hero-container">
            <picture>
                <source media="(min-width: 900px)" srcset="images/quilotoa-ecuador.webp">
                <img src="images/quilotoa-ecuador.webp" alt="Panoramic view of the emerald green Quilotoa crater lake" loading="lazy" width="800" height="500">
            </picture>
        </div>

        <section class="data-card facts">
            <h2>General Data</h2>
            <ul>
                <li><strong>Area:</strong> 283,561 sq km (Ecuador)</li>
                <li><strong>Population:</strong> 17.5 Million</li>
                <li><strong>Capital:</strong> Quito</li>
                <li><strong>Language:</strong> Spanish / Kichwa</li>
                <li><strong>Currency:</strong> US Dollar</li>
            </ul>
        </section>

        <section class="data-card weather">
            <h2 class="weather-heading">Weather</h2>
            
            <div class="weather-icon-mobile">
                <img src="images/weather-svgrepo-com.svg" alt="cloudy weather icon" width="50" height="50">
            </div>

            <ul class="weather-info">
                <li><strong>Temperature:</strong> <span id="temp">8</span> °C</li>
                <li><strong>Conditions:</strong> Partly Cloudy</li>
                <li><strong>Wind:</strong> <span id="wind">15</span> km/h</li>
                <li><strong>Wind Chill:</strong> <span id="windchill"></span></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> | Andre Guerrero | Ecuador</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Confirmation</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Thank You!</h1>
    </header>

    <main class="confirmation-container">
        <div class="confirmation-card">
            <div class="success-icon">&#10004;</div>
            <h2>Review Submitted Successfully</h2>
            <p>Your valuable feedback helps us maintain our quality standards!</p>
            
            <hr>
            
            <p class="counter-display">
                Total Reviews Submitted: <strong id="review-counter">0</strong>
            </p>
            
            <a href="form.html" class="back-btn">Submit Another Review</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 | Product Review Portal | Your Name Here</p>
    </footer>
</body>
</html>

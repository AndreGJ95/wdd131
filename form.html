<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product review form portal for subatomic and future tech components testing.">
    <meta name="author" content="Your Name Here">
    <title>Review: Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form action="review.html" method="get" class="review-form">
            
            <div class="form-group">
                <label for="product-name">Product Name <span class="required">*</span></label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <fieldset class="form-group">
                <legend>Overall Rating <span class="required">*</span></legend>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5" title="5 stars">&#9733;</label>
                    
                    <input type="radio" id="star4" name="rating" value="4" required>
                    <label for="star4" title="4 stars">&#9733;</label>
                    
                    <input type="radio" id="star3" name="rating" value="3" required>
                    <label for="star3" title="3 stars">&#9733;</label>
                    
                    <input type="radio" id="star2" name="rating" value="2" required>
                    <label for="star2" title="2 stars">&#9733;</label>
                    
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1" title="1 star">&#9733;</label>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="installation-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installation-date" name="installationDate" required>
            </div>

            <fieldset class="form-group">
                <legend>Useful Features (Check all that apply)</legend>
                <div class="checkbox-group">
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-durability" name="features" value="durability">
                        <label for="feature-durability">Durability</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-ease" name="features" value="ease-of-use">
                        <label for="feature-ease">Ease of Use</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-performance" name="features" value="performance">
                        <label for="feature-performance">Performance</label>
                    </div>
                    <div class="checkbox-option">
                        <input type="checkbox" id="feature-design" name="features" value="design">
                        <label for="feature-design">Design</label>
                    </div>
                </div>
            </fieldset>

            <div class="form-group">
                <label for="written-review">Written Review (Optional)</label>
                <textarea id="written-review" name="writtenReview" rows="5" placeholder="Share your experience..."></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name (Optional)</label>
                <input type="text" id="user-name" name="userName" placeholder="e.g. Marty McFly">
            </div>

            <button type="submit" class="submit-btn">Submit Review</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 | Product Review Portal | Andre Guerrero Jacome</p>
    </footer>
</body>
</html>
